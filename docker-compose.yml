services:
  homebrew_bringup:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        BASE_IMAGE: ${BASE_IMAGE:-zed_ros2_l4t_36.3.0_sdk_5.0.0}

    image: ufl-autonomy-park/homebrew-jetson:${IMAGE_TAG:-dev}
    container_name: ${CONTAINER_NAME:-autonomypark}

    runtime: nvidia
    network_mode: host
    ipc: host
    privileged: true
    # volumes:
    #   - /dev:/dev

    restart: unless-stopped
    environment:
      ROS_DOMAIN_ID: "${ROS_DOMAIN_ID:-0}"
      ROS_LOCALHOST_ONLY: "${ROS_LOCALHOST_ONLY:-0}"
      RMW_IMPLEMENTATION: "${RMW_IMPLEMENTATION:-rmw_fastrtps_cpp}"
      USE_DISCOVERY_SERVER: "${USE_DISCOVERY_SERVER:-false}"
      DISCOVERY_SERVER_ADDRESS: "${DISCOVERY_SERVER_ADDRESS:-}"

    command:
      - ros2
      - launch
      - homebrew_bringup
      - homebrew_bringup.launch.py
      - "launch_zed:=${LAUNCH_ZED:-true}"
      - "zed_model:=${ZED_MODEL:-zed2i}"
      - "zed_camera_name:=${ZED_CAMERA_NAME:-zed}"
      - "zed_namespace:=${ZED_NAMESPACE:-}"
      - "launch_mavros:=${LAUNCH_MAVROS:-true}"
      - "fcu_url:=${FCU_URL:-/dev/ttyFC:926100}"
      - "mavros_namespace:=${MAVROS_NAMESPACE:-homebrew}"
      - "mavros_respawn:=${MAVROS_RESPAWN:-true}"

    devices:
      - /dev/ttyFC:/dev/ttyFC
    # pid: host
    # platform: linux/arm64
