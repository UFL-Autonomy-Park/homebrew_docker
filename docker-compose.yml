services:
  homebrew_mavros:
    build:
      context: .
    container_name: com.uflautonomypark.homebrew_mavros.homebrew_mavros
    image: com.uflautonomypark.homebrew_mavros.homebrew_mavros:0.0.1
    network_mode: host
    privileged: true
    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0
    pid: host
    platform: linux/arm64
version: '3.7'
